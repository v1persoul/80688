<!--
    1: a través de un formulario indicar la imagen que deseo cargar
    2: tenga un "contenedor" a donde pueda ir salvando las imagenes (moverlas)
    3: a través del mismo formulario (mismo campo de texto) le puedo indicar 1,2,3 que deseo cargar esas imágenes
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bonus-practice</title>
</head>
<style>
    #div1 {
      width: 1000px;
      height: 350px;
      padding: 10px;
      border: 1px solid #aaaaaa;
    }
    </style>

<script>
    function allowDrop(ev) {
      ev.preventDefault();
    }
    
    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.id);
    }
    
    function drop(ev) {
      ev.preventDefault();
      var data = ev.dataTransfer.getData("text");
      ev.target.appendChild(document.getElementById(data));
    }
    </script>
<body>
    <h1>Imagenes :)</h1>
    <form action="" id="subirImagen"></form>
    <button type="submit">Subir Imagen</button>
    <div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<img id="1" src="https://fastly.picsum.photos/id/104/3840/2160.jpg?hmac=Rv0qxBiYb65Htow4mdeDlyT5kLM23Z2cDlN53YYldZU" draggable="true" ondragstart="drag(event)" width="200" height="150">
<img id="2" src="https://fastly.picsum.photos/id/119/3264/2176.jpg?hmac=PYRYBOGQhlUm6wS94EkpN8dTIC7-2GniC3pqOt6CpNU" draggable="true" ondragstart="drag(event)" width="200" height="150">
<img id="3" src="https://fastly.picsum.photos/id/154/3264/2176.jpg?hmac=a4Q6dBKGy7G27ic7K1sEPr-KzMigvl-MQsZUEX9iFxM" draggable="true" ondragstart="drag(event)" width="200" height="150">
<img id="4" src="https://fastly.picsum.photos/id/155/3264/2176.jpg?hmac=Zgf_oGMJeg18XoKBFmJgp2DgHMRYuorXlDx5wLII9nU" draggable="true" ondragstart="drag(event)" width="200" height="150">
</body>
</html>
