<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 06</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-image: url(https://fastly.picsum.photos/id/25/5000/3333.jpg?hmac=yCz9LeSs-i72Ru0YvvpsoECnCTxZjzGde805gWrAHkM);
        }            

        h1{
            text-align: center;
            padding: 50px;
            color: violet;
        }
        form{
            box-shadow:10px 20px 15px purple;
            width: 300px;
            border: 2px solid violet;
            margin: auto;
            padding: 20px;
        }
        input{
            width: 100%;
            border-radius: 3px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border: 2px solid violet;
        }
        input[type="submit"] {
            color: blueviolet;
            background-color: greenyellow;
            margin-top: 10px;
            padding-top: 7px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        label{
            margin-top: 10px;
            display: block;
        }
        
    </style>
</head>
<body>
    <h1>Inicio de sesion</h1>
    <form action="" id="formulario">
        <label for="user">Usuario:</label>
        <input type="text" id="user" name="user">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password">
        <input type="submit" value="Iniciar Sesión">
    </form>

    <script>
        const loginform = document.getElementById("formulario")
        loginform.addEventListener("submit", evento => {
            evento.preventDefault()
            //console.log(evento)
            let u = document.getElementById("user").value
            let p = document.getElementById("password").value
           // alert("Usuario:"+u+"Contraseña:"+p)
            alert(`Usuario: ${u} y Contraseña: ${p}`)
        })
    </script>
</body>
</html>
